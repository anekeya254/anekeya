<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highlights - Joseph Ongaka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobile scaling -->
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #6dd5fa, #ffffff);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      color: #2980b9;
      margin-bottom: 10px;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #1f6391;
    }

    .back-btn {
      display: block;
      margin: 30px auto 0;
      padding: 10px 20px;
      background: #555;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <h1>Highlights</h1>

  <div class="grid">
    <div class="card">
      <h2>Education</h2>
      <p>From Bulanda RC Primary to University of Embu (BBIT).</p>
      <button class="btn" onclick="window.location.href='education.html'">View Details</button>
    </div>

    <div class="card">
      <h2>Skills</h2>
      <p>Business IT, Computer Packages, Problem Solving, Teamwork.</p>
      <button class="btn" onclick="window.location.href='skills.html'">View Details</button>
    </div>

    <div class="card">
      <h2>Hobbies</h2>
      <p>Reading, Tech exploration, Debating.</p>
      <button class="btn" onclick="window.location.href='hobbies.html'">View Details</button>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <p>Phone: 0115391690 (WhatsApp available).</p>
      <button class="btn" onclick="window.location.href='contact.html'">View Details</button>
    </div>
  </div>

  <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>
</body>
</html>
