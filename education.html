<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Education - Joseph Ongaka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobile scaling -->
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(135deg, #ffffff, #6dd5fa);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      max-width: 600px;
      width: 100%;
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      text-align: center;
      color: #2980b9;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #333;
      margin: 10px 0;
    }

    .btn {
      display: block;
      margin: 30px auto 0;
      padding: 12px 25px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn:hover {
      background: #1f6391;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 📱 Mobile adjustments */
    @media (max-width: 480px) {
      .card {
        padding: 20px;
      }
      h1 {
        font-size: 22px;
      }
      p {
        font-size: 14px;
      }
      .btn {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Education</h1>
    <p><strong>Primary:</strong> Bulanda RC Primary School (up to Class 3)</p>
    <p><strong>Primary:</strong> Daisy Centre and School (Class 4–8, completed in 2019)</p>
    <p><strong>High School:</strong> St. Ignatius Mukumu Boys High School (2019–2023, KCSE B-)</p>
    <p><strong>University:</strong> University of Embu, Bachelor of Business Information Technology (BBIT)</p>

    <button class="btn" onclick="window.location.href='details.html'">⬅ Back to Highlights</button>
  </div>
</body>
</html>
